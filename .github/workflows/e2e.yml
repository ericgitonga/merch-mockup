name: E2E

# Gates a PR on the golden-path E2E suite (e2e/) running against a real
# Vercel Preview deployment of this exact PR. Not vercel dev / a hand-run
# local server — this app's mixed Python + Node Functions and its dependency
# on real Vercel Blob storage aren't something a local emulation faithfully
# stands in for (confirmed directly: several real bugs, including a CSP
# violation silently blocking the upload JS entirely, only surfaced when
# testing against an actual deployment). See issue #7.
#
# Requires two repository secrets:
#   VERCEL_TOKEN          — Vercel dashboard -> Account Settings -> Tokens
#   VERCEL_BYPASS_SECRET  — this project's "Protection Bypass for Automation"
#                           secret (Project -> Settings -> Deployment
#                           Protection), since Preview deployments sit behind
#                           Vercel's SSO wall by default.
# org/project IDs below are plain identifiers (same ones in the gitignored
# .vercel/project.json), not secrets.

on:
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: team_zqkuLyNQ340W09pXdT0og99l
  VERCEL_PROJECT_ID: prj_xGcrnQTO0TF36GWB3JGKE5csi9Fe

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy this PR to a Vercel Preview
        id: deploy
        run: |
          npm install -g vercel
          vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
          url=$(vercel deploy --target preview --yes --token="${{ secrets.VERCEL_TOKEN }}" 2>deploy.log | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"
          cat deploy.log

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (Python)
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run E2E suite against the Preview deployment
        env:
          BASE_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
        run: python e2e/run.py

      - name: Print deploy log
        if: always()
        run: cat deploy.log || true
